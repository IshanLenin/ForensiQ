version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: forensics_auth_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: forensics_app
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis_cache:
    image: redis:7
    container_name: forensics_auth_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: